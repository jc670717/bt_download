name: Release On Tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build EXE
        shell: pwsh
        run: |
          ./build_windows.ps1

      - name: Create SHA256
        shell: pwsh
        run: |
          certutil -hashfile dist/TorrentBatchDownloader.exe SHA256 > dist/TorrentBatchDownloader.exe.sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/TorrentBatchDownloader.exe
            dist/TorrentBatchDownloader.exe.sha256.txt
          generate_release_notes: true
